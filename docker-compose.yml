services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/app
    networks:
      - kaizenboard

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - kaizenboard

networks:
  kaizenboard:
    driver: bridge

volumes:
  sqlite-data:
